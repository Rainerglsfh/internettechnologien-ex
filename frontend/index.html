<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="todo.css">
    <title>ToDo App</title>
</head>

<body>

    <div class="top-bar">
        <button id="login-button" type="button">Login</button>
    </div>

    <div class="form-container">

        <h2>Neues ToDo erstellen</h2>

        <form onsubmit="addTodo(event)">
            <label for="title">Titel *</label>
            <input type="text" id="title" name="title" required>

            <label for="description">Beschreibung</label>
            <textarea id="description" name="description"></textarea>

            <label for="date">Fälligkeitsdatum</label>
            <input type="date" id="date" name="date">

            <label>Priorität *</label>
            <div class="priority-group">
                <label>
                    <input type="radio" name="priority" value="low" required>
                    Niedrig
                </label>
                <label>
                    <input type="radio" name="priority" value="medium" required>
                    Mittel
                </label>
                <label>
                    <input type="radio" name="priority" value="high" required>
                    Hoch
                </label>
            </div>

            <label for="category">Kategorie</label>
            <select name="category" id="category">
                <option value="school">Schule</option>
                <option value="work">Arbeit</option>
                <option value="private">Privat</option>
            </select>

            <div class="buttons">
                <button type="submit" class="save">Senden</button>
                <button type="reset" class="cancel">Zurücksetzen</button>
            </div>
        </form>
    </div>

    <div class="todo-panel">
        <div class="filter-tabs" id="category-tabs">
            <button class="filter-btn active" data-filter="all">Alle</button>
            <button class="filter-btn" data-filter="school">Schule</button>
            <button class="filter-btn" data-filter="work">Arbeit</button>
            <button class="filter-btn" data-filter="private">Privat</button>
        </div>
        <div id="todo-list"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
